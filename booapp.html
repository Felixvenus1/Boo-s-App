<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boo Virtual Pet</title>
    <style>
        :root {
            --color-white: rgba(255, 255, 255, 1);
            --color-black: rgba(0, 0, 0, 1);
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-gray-300: rgba(167, 169, 169, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-pink-400: rgba(244, 114, 182, 1);
            --color-pink-500: rgba(236, 72, 153, 1);
            --color-purple-400: rgba(192, 132, 252, 1);
            --color-yellow-400: rgba(250, 204, 21, 1);
            --color-red-500: rgba(239, 68, 68, 1);
            --color-green-500: rgba(34, 197, 94, 1);
            
            --color-background: var(--color-cream-50);
            --color-surface: var(--color-cream-100);
            --color-text: var(--color-charcoal-700);
            --color-primary: var(--color-pink-500);
            --color-primary-hover: var(--color-pink-400);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background: var(--color-charcoal-700);
                --color-surface: var(--color-charcoal-800);
                --color-text: var(--color-gray-200);
                --color-primary: var(--color-pink-400);
                --color-primary-hover: var(--color-pink-500);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: var(--color-surface);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 24px;
            color: var(--color-text);
        }

        h1 {
            text-align: center;
            color: var(--color-primary);
            margin-bottom: 8px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: var(--color-slate-500);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .character-display {
            background: linear-gradient(180deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .character {
            font-size: 120px;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .character.bounce {
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* spin animation for outfit changes */
        .character.spin {
            animation: spin 0.6s ease;
        }

        @keyframes spin {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(360deg); }
        }

        .mood-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .speech-bubble {
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            position: relative;
            display: inline-block;
            font-size: 0.9rem;
            color: var(--color-charcoal-700);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        .stats-container {
            background: var(--color-background);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .stat {
            margin-bottom: 16px;
        }

        .stat:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-bar {
            background: rgba(0, 0, 0, 0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .stat-fill {
            height: 100%;
            transition: width 0.5s ease, background-color 0.3s ease;
            border-radius: 6px;
        }

        .stat-fill.hunger { background: var(--color-green-500); }
        .stat-fill.thirst { background: var(--color-teal-500); }
        .stat-fill.energy { background: var(--color-yellow-400); }
        .stat-fill.happiness { background: var(--color-pink-500); }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .btn:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-icon {
            font-size: 1.5rem;
        }

        .outfits {
            background: var(--color-background);
            border-radius: 12px;
            padding: 16px;
        }

        .outfits h3 {
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .outfit-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .outfit-btn {
            background: white;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .outfit-btn:hover {
            border-color: var(--color-primary);
            transform: scale(1.02);
        }

        .outfit-btn.active {
            border-color: var(--color-primary);
            background: rgba(236, 72, 153, 0.1);
        }

        .time-indicator {
            text-align: center;
            font-size: 0.8rem;
            color: var(--color-slate-500);
            margin-top: 16px;
        }

        @media (prefers-color-scheme: dark) {
            .speech-bubble {
                background: var(--color-charcoal-800);
                color: var(--color-gray-200);
            }
            
            .speech-bubble::after {
                border-top-color: var(--color-charcoal-800);
            }

            .outfit-btn {
                background: var(--color-charcoal-800);
                color: var(--color-gray-200);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎀 Boo 🎀</h1>
        <p class="subtitle">Your Virtual Pet</p>

        <div class="character-display">
            <div class="character" id="character">👧</div>
            <div class="mood-text" id="moodText">Happy</div>
            <div class="speech-bubble" id="speechBubble">Hi! I'm Boo!</div>
        </div>

        <div class="stats-container">
            <div class="stat">
                <div class="stat-label">
                    <span>🍔 Hunger</span>
                    <span id="hungerValue">100%</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill hunger" id="hungerBar" style="width: 100%"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>💧 Thirst</span>
                    <span id="thirstValue">100%</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill thirst" id="thirstBar" style="width: 100%"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>⚡ Energy</span>
                    <span id="energyValue">100%</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill energy" id="energyBar" style="width: 100%"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>😊 Happiness</span>
                    <span id="happinessValue">100%</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill happiness" id="happinessBar" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="feedBoo()">
                <span class="btn-icon">🍕</span>
                <span>Feed</span>
            </button>
            <button class="btn" onclick="giveDrink()">
                <span class="btn-icon">💧</span>
                <span>Drink</span>
            </button>
            <button class="btn" onclick="walkBoo()">
                <span class="btn-icon">🚶‍♀️</span>
                <span>Walk</span>
            </button>
        </div>

        <div class="outfits">
            <h3>👗 Outfits</h3>
            <div class="outfit-grid">
                <button class="outfit-btn active" onclick="changeOutfit('casual')">
                    👧 Casual
                </button>
                <button class="outfit-btn" onclick="changeOutfit('princess')">
                    👸 Princess
                </button>
                <button class="outfit-btn" onclick="changeOutfit('sporty')">
                    🏃‍♀️ Sporty
                </button>
                <button class="outfit-btn" onclick="changeOutfit('pajamas')">
                    🌙 Pajamas
                </button>
            </div>
        </div>

        <div class="time-indicator" id="timeIndicator">
            Time with Boo: 0s
        </div>
    </div>

    <script>
        const gameState = {
            hunger: 100,
            thirst: 100,
            energy: 100,
            happiness: 100,
            mood: 'happy',
            outfit: 'casual',
            startTime: Date.now()
        };

        const outfits = {
            casual: '👧',
            princess: '👸',
            sporty: '🏃‍♀️',
            pajamas: '🌙'
        };

        const moods = {
            happy: {
                emoji: '😊',
                text: 'Happy',
                messages: [
                    "I'm having so much fun!",
                    "You're the best!",
                    "I love spending time with you!",
                    "This is amazing!",
                    "Yay! Life is great!"
                ]
            },
            sad: {
                emoji: '😢',
                text: 'Sad',
                messages: [
                    "I'm feeling a bit down...",
                    "Could you take care of me?",
                    "I need some attention...",
                    "Please don't forget about me...",
                    "I'm not feeling great..."
                ]
            },
            angry: {
                emoji: '😠',
                text: 'Angry',
                messages: [
                    "I'm really upset right now!",
                    "You're not taking care of me!",
                    "This isn't fair!",
                    "Pay attention to me!",
                    "I need help NOW!"
                ]
            }
        };

        function updateMood() {
            const avgStat = (gameState.hunger + gameState.thirst + gameState.energy) / 3;
            
            if (avgStat > 60) {
                gameState.mood = 'happy';
                gameState.happiness = Math.min(100, gameState.happiness + 0.5);
            } else if (avgStat > 30) {
                gameState.mood = 'sad';
                gameState.happiness = Math.max(0, gameState.happiness - 0.3);
            } else {
                gameState.mood = 'angry';
                gameState.happiness = Math.max(0, gameState.happiness - 0.5);
            }

            const currentMood = moods[gameState.mood];
            document.getElementById('moodText').textContent = currentMood.text + ' ' + currentMood.emoji;
            
            const randomMessage = currentMood.messages[Math.floor(Math.random() * currentMood.messages.length)];
            document.getElementById('speechBubble').textContent = randomMessage;
        }

        function updateDisplay() {
            document.getElementById('hungerBar').style.width = gameState.hunger + '%';
            document.getElementById('hungerValue').textContent = Math.round(gameState.hunger) + '%';
            
            document.getElementById('thirstBar').style.width = gameState.thirst + '%';
            document.getElementById('thirstValue').textContent = Math.round(gameState.thirst) + '%';
            
            document.getElementById('energyBar').style.width = gameState.energy + '%';
            document.getElementById('energyValue').textContent = Math.round(gameState.energy) + '%';
            
            document.getElementById('happinessBar').style.width = gameState.happiness + '%';
            document.getElementById('happinessValue').textContent = Math.round(gameState.happiness) + '%';
        }

        function animateCharacter() {
            const character = document.getElementById('character');
            character.classList.add('bounce');
            setTimeout(() => character.classList.remove('bounce'), 600);
        }

        function feedBoo() {
            gameState.hunger = Math.min(100, gameState.hunger + 30);
            animateCharacter();
            updateMood();
            updateDisplay();
            document.getElementById('speechBubble').textContent = "Yummy! Thanks for the food!";
        }

        function giveDrink() {
            gameState.thirst = Math.min(100, gameState.thirst + 30);
            animateCharacter();
            updateMood();
            updateDisplay();
            document.getElementById('speechBubble').textContent = "Refreshing! I feel better!";
        }

        function walkBoo() {
            gameState.energy = Math.min(100, gameState.energy + 25);
            gameState.hunger = Math.max(0, gameState.hunger - 10);
            gameState.thirst = Math.max(0, gameState.thirst - 10);
            animateCharacter();
            updateMood();
            updateDisplay();
            document.getElementById('speechBubble').textContent = "That walk was fun!";
        }

        function changeOutfit(outfit) {
            gameState.outfit = outfit;
            const characterEl = document.getElementById('character');

            // spin character to reveal new outfit and swap emoji halfway through
            animateOutfitChange(characterEl, outfits[outfit]);

            const buttons = document.querySelectorAll('.outfit-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('speechBubble').textContent = `Now I'm wearing my ${outfit} outfit!`;
        }

        function animateOutfitChange(el, newEmoji) {
            el.classList.add('spin');
            // swap emoji at halfway point (300ms)
            setTimeout(() => { el.textContent = newEmoji; }, 300);
            setTimeout(() => el.classList.remove('spin'), 600);
        }

        function decreaseStats() {
            gameState.hunger = Math.max(0, gameState.hunger - 0.5);
            gameState.thirst = Math.max(0, gameState.thirst - 0.7);
            gameState.energy = Math.max(0, gameState.energy - 0.3);
            
            updateMood();
            updateDisplay();
        }

        function updateTime() {
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            if (minutes > 0) {
                document.getElementById('timeIndicator').textContent = 
                    `Time with Boo: ${minutes}m ${seconds}s`;
            } else {
                document.getElementById('timeIndicator').textContent = 
                    `Time with Boo: ${seconds}s`;
            }
        }

        setInterval(decreaseStats, 3000);
        setInterval(updateTime, 1000);
        
        updateDisplay();
        updateMood();
    </script>
</body>
</html>
